# Dead-code analysis roots — entrypoint-oriented only.
# Do not reintroduce a blanket root-modules list of every library module;
# that defeats weeder for this application-internal library surface.
# Intentional public roots belong in comments + justified root-modules entries,
# not a full-module dump.
#
# HIE layout (see cabal ghc-options): .hie/lib, .hie/exe, .hie/test so app and
# test Main modules do not overwrite each other. Invoke weeder with all three
# --hie-directory flags (see hk.pkl / CONTRIBUTING).
roots = [
  "^Main\\.main$",
  "^Paths_mndz_overlay_manager\\..*",
]
type-class-roots = true
