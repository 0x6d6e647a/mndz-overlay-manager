# Dead-code analysis roots.
# Main.main (app + test) anchors the runtime graph; root-modules keep library
# public exports alive for intentional library API surface.
roots = [
  "^Main\\.main$",
  "^Paths_mndz_overlay_manager\\..*",
]
root-modules = [
  "Update.Git",
  "CLI.Jobs",
  "CLI.Parser",
  "CLI.Progress",
  "Config.Loader",
  "Config.Types",
  "Logging.Bootstrap",
  "Overlay.Discovery",
  "Overlay.Types",
  "Overlay.Validation",
  "Overlay.Version",
  "Update.Check",
  "Update.Targets",
  "Update.Preflight",
  "Update.Apply",
  "Update.Assets.Hash",
  "Update.Assets.Layout",
  "Update.Assets.Release",
  "Update.Auth",
  "Update.EbuildEdit",
  "Update.GitHub",
  "Update.Go.Plan",
  "Update.Go.Vendor",
  "Update.Go.Version",
  "Update.Hardcoded",
  "Update.Http",
  "Update.Npm",
  "Update.Resolve",
  "Update.GpgAgent",
  "Update.SshAgent",
  "Update.Types",
]
type-class-roots = true
